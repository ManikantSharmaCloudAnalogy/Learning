<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paint diagonal element </title>
    <style>
        table{
            border-collapse: collapse;
        }

        td{
            border:1px solid black;
            padding:22px;
            text-align: center;
        }
    </style>
</head>
<body>
    <table id="table_id">
        <tr>
            <td> 1</td>
             <td> 2</td>
              <td> 3</td>
        </tr>
        <tr>
            <td>4</td>
            <td>5</td>
            <td>6</td>
        </tr>
        <tr>
            <td>7
            </td>
            <td>8</td>
            <td>9</td>
        </tr>
    </table>
<script>
   let tableId=document.getElementById("table_id");
    let rows=tableId.rows;
    for(let i=0;i<rows.length;i++){
        rows[i].cells[i].style.backgroundColor="red";
    };
    </script>
</body>
</html>
